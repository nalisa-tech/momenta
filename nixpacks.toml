[phases.setup]
nixPkgs = ['python39']

[phases.install]
cmds = ['pip install -r requirements.txt']

[phases.build]
cmds = ['python manage.py collectstatic --noinput']

[start]
cmd = 'gunicorn event_system.wsgi:application --bind 0.0.0.0:$PORT'

[variables]
DJANGO_SETTINGS_MODULE = 'event_system.settings'
WSGI_APPLICATION = 'event_system.wsgi.application'
